name: Update Documentation

on:
  pull_request:
    paths:
      - application/*/Chart.yaml
      - application/*/README.md.gotmpl
      - application/*/values.yaml
      - library/*/Chart.yaml
      - library/*/README.md.gotmpl
      - library/*/values.yaml

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

defaults:
  run:
    shell: bash

permissions:
  contents: write

jobs:
  update:
    name: Pull Request
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure repository
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            import configureGit from './.github/scripts/git-config.js';
            await configureGit({github, context, core, exec});

      - name: Install helm-docs package
        env:
          HELM_DOCS_URL: https://github.com/norwoodj/helm-docs/releases/download
          HELM_DOCS_VERSION: 1.14.2
        uses: actions/github-script@v7
        with:
          script: |
            const os = require('os');
            const tmpDir = os.tmpdir();
            const packagePath = [tmpDir,
              'helm-docs_' + process.env.HELM_DOCS_VERSION + '_Linux_x86_64.deb'
            ].join('/');
            const packageUrl = [process.env.HELM_DOCS_URL, 'v' + process.env.HELM_DOCS_VERSION,
              'helm-docs_' + process.env.HELM_DOCS_VERSION + '_Linux_x86_64.deb'
            ].join('/');
            const runSudo = async (args) => (await exec.exec('sudo', args));
            try {
              await runSudo(['wget', '-qP', tmpDir, packageUrl]);
              await runSudo(['apt-get', '-y', 'install', packagePath]);
            } catch (error) {
              core.setFailed(error.message);
            }

      - name: Update pull request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            import fs from 'fs/promises';
            import createSignedCommit, { getGitStagedChanges } from './.github/scripts/git-signed-commit.js';
            const runGit = async (args) => (await exec.getExecOutput('git', args)).stdout.trim();
            try {
              await runGit(['fetch', 'origin', process.env.GITHUB_HEAD_REF]);
              await runGit(['switch', process.env.GITHUB_HEAD_REF]);
              await exec.exec('helm-docs');
              await runGit(['add', '.']);
              const files = (await runGit(['diff', '--name-only', '--staged'])).split('\n').filter(Boolean);
              if (files.length === 0) {
                core.info('No file changes detected.');
                return;
              }
              const { additions, deletions } = await getGitStagedChanges(runGit, fs);
              await createSignedCommit({
                github,
                context,
                core,
                branchName: context.payload.pull_request.head.ref,
                expectedHeadOid: context.payload.pull_request.head.sha,
                additions,
                deletions,
                commitMessage: 'docs(github-action): update documentation'
              });
            } catch (error) {
              core.setFailed(error.message);
            }
