name: Chart

on:
  pull_request:
    paths:
      - application/*/Chart.yaml
      - application/*/README.md.gotmpl
      - application/*/values.yaml
      - library/*/Chart.yaml
      - library/*/README.md.gotmpl
      - library/*/values.yaml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    name: Update
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure repository
        uses: actions/github-script@v7
        with:
          script: |
            const { configureGit } = require('./.github/scripts/git-config.js');
            await configureGit({ github, context, core, exec });

      - name: Setup helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Setup helm-docs
        uses: actions/github-script@v7
        with:
          script: |
            const { setupHelmDocs } = require('./.github/scripts/documentation.js');
            await setupHelmDocs({ core, exec });

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install node.js dependencies
        run: npm install js-yaml handlebars

      - name: Update documentation
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { updateDocumentation } = require('./.github/scripts/documentation.js');
            await updateDocumentation({ github, context, core, exec });

      - name: Update dependency lock files
        uses: actions/github-script@v7
        with:
          script: |
            const { updateLockFiles } = require('./.github/scripts/pages.js');
            await updateLockFiles({ github, context, core, exec });
