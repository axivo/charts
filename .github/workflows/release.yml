name: Charts Release

on:
  push:
    branches:
      - main
    paths:
      - "application/**"
      - "library/**"
      - ".github/chart-releaser.yml"
      - ".github/pages/index.md.gotmpl"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: Package and Publish Charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git User
        uses: actions/github-script@v7
        with:
          script: |
            const configureGit = require('./.github/scripts/git-config.js');
            await configureGit({github, context, core, exec});

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install js-yaml handlebars

      - name: Run chart-releaser for applications
        uses: helm/chart-releaser-action@v1
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_INDEX_PATH: ./_dist/index.yaml
        with:
          charts_dir: application
          config: .github/chart-releaser.yml
          skip_existing: true

      - name: Run chart-releaser for libraries
        uses: helm/chart-releaser-action@v1
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_INDEX_PATH: ./_dist/index.yaml
        with:
          charts_dir: library
          config: .github/chart-releaser.yml
          skip_existing: true

      - name: Generate index.md locally using Handlebars
        id: generate_index
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs/promises');
            const yaml = require('js-yaml');
            const Handlebars = require('handlebars');
            const indexYamlPath = './_dist/index.yaml';
            const indexMdPath = './_dist/index.md';
            const templatePath = '.github/pages/index.md.gotmpl';

            try {
              core.info(`Reading index YAML from ${indexYamlPath}`);
              const indexContent = await fs.readFile(indexYamlPath, 'utf8');
              const index = yaml.load(indexContent);

              if (!index || !index.entries) {
                core.warning('Invalid or empty index.yaml file, skipping index.md generation.');
                return;
              }

              core.info(`Reading template from ${templatePath}`);
              const template = await fs.readFile(templatePath, 'utf8');

              // Register helper for template
              Handlebars.registerHelper('rawGithubUrl', function(repoUrl, branch, path) {
                 return String(repoUrl).replace('github.com', 'raw.githubusercontent.com') + '/' + branch + '/' + path;
              });

              const repoUrl = context.payload.repository.html_url;
              const defaultBranchName = context.payload.repository.default_branch;

              const charts = Object.entries(index.entries)
                .sort(([a], [b]) => a.localeCompare(b))
                .map(([name, versions]) => {
                  if (!versions || !versions.length) return null;
                  const latest = versions[0]; // Assuming versions[0] is the latest
                  return {
                    Name: name,
                    Version: latest.version || '',
                    Type: latest.type || 'application', // Default type if missing
                    Description: latest.description || ''
                  };
                })
                .filter(Boolean);

              const compiledTemplate = Handlebars.compile(template);
              const newContent = compiledTemplate({
                Charts: charts,
                RepoURL: repoUrl,
                Branch: defaultBranchName
              });

              core.info(`Writing generated index.md to ${indexMdPath}`);
              await fs.writeFile(indexMdPath, newContent);
              core.info('Successfully generated index.md');

            } catch (error) {
              core.setFailed(`Failed to generate index.md: ${error.message}`);
            }

      - name: Deploy index files to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_dist
          publish_branch: gh-pages
          keep_files: true
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_message: "chore(github-action): update chart index yaml and md"
          force_orphan: false
