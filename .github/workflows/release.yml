name: Charts Release

on:
  push:
    branches:
      - main
    paths:
      - .github/chart-releaser.yml
      - .github/pages/config.yml
      - .github/pages/index.md.hbs
      - application/**
      - library/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    name: Package and Publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        uses: actions/github-script@v7
        with:
          script: |
            const configureGit = require('./.github/scripts/git-config.js');
            await configureGit({github, context, core, exec});

      - name: Setup helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install js-yaml handlebars

      - name: Create dist directory
        run: install -d ./_dist

      - name: Release application charts
        uses: helm/chart-releaser-action@v1
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_INDEX_PATH: ./_dist/index.yaml
        with:
          charts_dir: application
          config: .github/chart-releaser.yml
          skip_existing: true

      - name: Release library charts
        uses: helm/chart-releaser-action@v1
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_INDEX_PATH: ./_dist/index.yaml
        with:
          charts_dir: library
          config: .github/chart-releaser.yml
          skip_existing: true

      - name: Generate chart index page
        id: generate_index
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs/promises');
            const { generateChartIndex } = require('./.github/scripts/pages.js');
            await generateChartIndex({ github, context, core, fs });

      - name: Setup build environment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs/promises');
            const path = require('path');
            const { setupBuildEnvironment } = require('./.github/scripts/pages.js');
            await setupBuildEnvironment({ github, context, core, fs, path });

      - name: Build website
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Prepare site for GitHub Pages
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs/promises');
            const { prepareSite } = require('./.github/scripts/pages.js');
            await prepareSite({ github, context, core, fs });

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
