name: Charts Release

on:
  push:
    branches:
      - main
    paths:
      - application/**
      - library/**
  workflow_dispatch:

jobs:
  release:
    name: Package and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure repository
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const configureGit = require('./.github/scripts/git-config.js');
            await configureGit({github, context, core, exec});

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install js-yaml package
        run: npm install js-yaml

      - name: Prepare gh-pages branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs/promises');
            const fsSync = require('fs');
            const yaml = require('js-yaml');
            const createSignedCommit = require('./.github/scripts/git-signed-commit.js');
            const branchName = 'gh-pages';
            const crConfigPath = '.github/cr-config.yml';
            const themeConfigPath = '.github/pages/config.yml';
            const defaultBranchName = context.payload.repository.default_branch;
            const runGit = async (args) => (await exec.getExecOutput('git', args)).stdout.trim();
            try {
              const configContent = await fs.readFile(crConfigPath, 'utf8');
              const indexPathLine = configContent.split('\n').find(line => line.trim().startsWith('index-path:'));
              const indexPath = indexPathLine?.split(':')[1]?.trim() || 'index.yaml';
              const branchExists = (await runGit(['ls-remote', '--heads', 'origin', branchName])).length > 0;
              if (!branchExists) {
                core.info('Creating gh-pages branch ...');
                await runGit(['checkout', '--orphan', branchName]);
                await runGit(['rm', '-rf', '.']);
                await runGit(['checkout', defaultBranchName, themeConfigPath]);
                const configTemplate = await fs.readFile(themeConfigPath, 'utf8');
                const config = yaml.load(configTemplate);
                await fs.writeFile('README.md', config.readme_content);
                await runGit(['add', 'README.md']);
                const headSha = await runGit(['rev-parse', 'HEAD']);
                await createSignedCommit({
                  github,
                  context,
                  core,
                  branchName: branchName,
                  expectedHeadOid: headSha,
                  additions: [{
                    path: 'README.md',
                    contents: Buffer.from(config.readme_content).toString('base64')
                  }],
                  commitMessage: 'chore(github-action): initialize gh-pages branch'
                });
                await fs.writeFile('_config.yml', configTemplate);
                await runGit(['add', '_config.yml']);
                const newHeadSha = await runGit(['rev-parse', 'HEAD']);
                await createSignedCommit({
                  github,
                  context,
                  core,
                  branchName: branchName,
                  expectedHeadOid: newHeadSha,
                  additions: [{
                    path: '_config.yml',
                    contents: Buffer.from(configTemplate).toString('base64')
                  }],
                  commitMessage: 'chore(github-action): add theme configuration'
                });
                await runGit(['push', 'origin', branchName]);
                await runGit(['checkout', defaultBranchName]);
              }
            } catch (error) {
              core.setFailed(error.message);
            }

      - name: Run chart-releaser for applications
        uses: helm/chart-releaser-action@v1
        id: release-application
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          charts_dir: application
          config: .github/cr-config.yml
          skip_existing: true

      - name: Run chart-releaser for libraries
        uses: helm/chart-releaser-action@v1
        id: release-library
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          charts_dir: library
          config: .github/cr-config.yml
          skip_existing: true

      - name: Update index.md on gh-pages branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs/promises');
            const fsSync = require('fs');
            const yaml = require('js-yaml');
            const createSignedCommit = require('./.github/scripts/git-signed-commit.js');
            const branchName = 'gh-pages';
            const defaultBranchName = context.payload.repository.default_branch;
            const crConfigPath = '.github/cr-config.yml';
            const themeConfigPath = '.github/pages/config.yml';
            const themeIndexPath = '.github/pages/index.md.gotmpl';
            const runGit = async (args) => (await exec.getExecOutput('git', args)).stdout.trim();
            try {
              await runGit(['fetch', 'origin', branchName]);
              await runGit(['switch', branchName]);
              await runGit(['checkout', defaultBranchName, crConfigPath]);
              const crConfigContent = await fs.readFile(crConfigPath, 'utf8');
              const crConfig = yaml.load(crConfigContent);
              const indexPath = crConfig['index-path'];
              const indexExists = fsSync.existsSync(indexPath);
              if (!indexExists) {
                core.warning(indexPath + ' not found, skipping index.md update.');
                await runGit(['checkout', defaultBranchName]);
                return;
              }
              await runGit(['checkout', defaultBranchName, themeIndexPath]);
              const template = await fs.readFile(themeIndexPath, 'utf8');
              const indexContent = await fs.readFile(indexPath, 'utf8');
              const index = yaml.load(indexContent);
              if (!index || !index.entries) {
                core.warning('Invalid or empty index.yaml file, skipping index.md update.');
                await runGit(['checkout', defaultBranchName]);
                return;
              }
              const repoUrl = context.payload.repository.html_url;
              const chartTable = Object.entries(index.entries)
                .sort(([a], [b]) => a.localeCompare(b))
                .map(([name, versions]) => {
                  if (!versions || !versions.length) return null;
                  const version = versions[0].version || '';
                  const type = versions[0].type || 'application';
                  const description = versions[0].description || '';
                  const link = [repoUrl, 'tree', defaultBranchName, type, name].join('/');
                  return ['[`' + name + '`](' + link + ')', version, type, description.replace(/\|/g, '\\|')].join(' | ');
                })
                .filter(Boolean)
                .join('\n');
              const indexMdPath = indexPath.replace('.yaml', '.md');
              const templateContent = template.replace(/{{ range \.Charts }}[\s\S]*?{{ end }}/, chartTable);
              await fs.writeFile(indexMdPath, templateContent);
              await runGit(['add', indexMdPath]);
              const files = (await runGit(['diff', '--staged', '--name-only'])).split('\n').filter(file => file.length > 0);
              if (files.length > 0) {
                const placeholderPath = '.placeholder';
                if (fsSync.existsSync(placeholderPath)) {
                  await fs.unlink(placeholderPath);
                  await runGit(['add', placeholderPath]);
                }
                const additions = await Promise.all(
                  files.filter(file => !file.includes(placeholderPath) || !fsSync.existsSync(file))
                    .map(async file => {
                      try {
                        const contents = await fs.readFile(file, 'utf-8');
                        return { 
                          path: file, 
                          contents: Buffer.from(contents).toString('base64') 
                        };
                      } catch (err) {
                        return null;
                      }
                    })
                );
                const validAdditions = additions.filter(item => item !== null);
                const deletions = fsSync.existsSync(placeholderPath) ? [] : [{ path: placeholderPath }];
                const headSha = await runGit(['rev-parse', 'HEAD']);
                await createSignedCommit({
                  github,
                  context,
                  core,
                  branchName: branchName,
                  expectedHeadOid: headSha,
                  additions: validAdditions,
                  deletions: deletions,
                  commitMessage: 'chore(github-action): update chart release documentation'
                });
                await runGit(['push', 'origin', branchName]);
              } else {
                core.info('No changes to index.md detected.');
              }
              await runGit(['checkout', defaultBranchName]);
              core.info('Successfully processed index.md for gh-pages branch.');
            } catch (error) {
              core.setFailed(error.message);
              try {
                await runGit(['checkout', defaultBranchName]);
              } catch (checkoutError) {
                core.setFailed(checkoutError.message);
              }
            }
