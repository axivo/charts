name: Charts Release

on:
  push:
    branches:
      - main
    paths:
      - application/**
      - library/**
  workflow_dispatch:

jobs:
  release:
    name: Package and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure repository
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const configureGit = require('./.github/scripts/git-config.js');
            await configureGit({github, context, core, exec});

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install required packages
        run: npm install js-yaml handlebars

      - name: Prepare gh-pages branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs/promises');
            const yaml = require('js-yaml');
            const createSignedCommit = require('./.github/scripts/git-signed-commit.js');
            const retryGitPush = require('./.github/scripts/git-helpers.js');
            const crConfigPath = '.github/chart-releaser.yml';
            const configPath = '.github/pages/config.yml';
            const branchName = 'gh-pages';
            const defaultBranchName = context.payload.repository.default_branch;
            const runGit = async (args) => (await exec.getExecOutput('git', args)).stdout.trim();

            try {
              const branchExists = (await runGit(['ls-remote', '--heads', 'origin', branchName])).length > 0;
              if (branchExists) {
                core.info('Branch ' + branchName + ' already exists');
                return;
              }

              await retryGitPush.withGitStash({
                runGit,
                core,
                message: 'Stash for gh-pages creation',
                operation: async () => {
                  core.info('Creating ' + branchName + ' branch...');
                  let configContent;
                  try {
                    configContent = await fs.readFile(configPath, 'utf8');
                  } catch (fileError) {
                    core.setFailed('Failed to read config file ' + configPath + ': ' + fileError.message);
                    return;
                  }
                  const config = yaml.load(configContent);
                  const readmeContent = config.readme_content || '# Helm Charts Repository';
                  await runGit(['checkout', '--orphan', branchName]);
                  await runGit(['rm', '-rf', '.']);
                  try {
                    await fs.writeFile('README.md', readmeContent);
                    await fs.writeFile('_config.yml', configContent);
                  } catch (writeError) {
                    core.setFailed('Failed to write files: ' + writeError.message);
                    return;
                  }
                  await runGit(['add', 'README.md', '_config.yml']);
                  await runGit(['commit', '-m', 'Initialize gh-pages branch']);
                  try {
                    await retryGitPush({ runGit, core, branch: branchName });
                    core.info('Successfully created ' + branchName + ' branch');
                  } catch (pushError) {
                    core.setFailed('Failed to push ' + branchName + ' branch: ' + pushError.message);
                  }
                }
              });
            } catch (error) {
              core.setFailed('Unexpected error: ' + error.message);
            }

      - name: Run chart-releaser for applications
        uses: helm/chart-releaser-action@v1
        id: release-application
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          charts_dir: application
          config: .github/chart-releaser.yml
          skip_existing: true

      - name: Run chart-releaser for libraries
        uses: helm/chart-releaser-action@v1
        id: release-library
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          charts_dir: library
          config: .github/chart-releaser.yml
          skip_existing: true

      - name: Update index.md on gh-pages branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs/promises');
            const yaml = require('js-yaml');
            const Handlebars = require('handlebars');
            const createSignedCommit = require('./.github/scripts/git-signed-commit.js');
            const { getGitStagedChanges } = require('./.github/scripts/git-signed-commit.js');
            const retryGitPush = require('./.github/scripts/git-helpers.js');
            const branchName = 'gh-pages';
            const defaultBranchName = context.payload.repository.default_branch;
            const crConfigPath = '.github/chart-releaser.yml';
            const configPath = '.github/pages/config.yml';
            const indexTemplatePath = '.github/pages/index.md.gotmpl';
            const runGit = async (args) => (await exec.getExecOutput('git', args)).stdout.trim();

            async function fileExists(filePath) {
              try {
                await fs.access(filePath);
                return true;
              } catch {
                return false;
              }
            }

            try {
              const branchExists = (await runGit(['ls-remote', '--heads', 'origin', branchName])).length > 0;
              if (!branchExists) {
                core.warning('Branch ' + branchName + ' does not exist, skipping index update.');
                return;
              }

              await retryGitPush.withGitStash({
                runGit,
                core,
                message: 'Stash for index.md update',
                operation: async () => {
                  await runGit(['fetch', 'origin', branchName]);
                  await runGit(['switch', branchName]);

                  let crConfig;
                  try {
                    const crConfigContent = await fs.readFile(crConfigPath, 'utf8');
                    crConfig = yaml.load(crConfigContent);
                  } catch (configError) {
                    core.setFailed('Failed to read ' + crConfigPath + ': ' + configError.message);
                    return;
                  }

                  const indexPath = crConfig['index-path'] || 'index.yaml';
                  if (!await fileExists(indexPath)) {
                    core.warning(indexPath + ' not found, skipping index.md update.');
                    return;
                  }

                  let template;
                  try {
                    template = await fs.readFile(indexTemplatePath, 'utf8');
                  } catch (templateError) {
                    core.setFailed('Failed to read template file ' + indexTemplatePath + ': ' + templateError.message);
                    return;
                  }

                  let index;
                  try {
                    const indexContent = await fs.readFile(indexPath, 'utf8');
                    index = yaml.load(indexContent);
                  } catch (indexError) {
                    core.setFailed('Failed to read index file ' + indexPath + ': ' + indexError.message);
                    return;
                  }

                  if (!index || !index.entries) {
                    core.warning('Invalid or empty index.yaml file, skipping index.md update.');
                    return;
                  }

                  Handlebars.registerHelper('rawGithubUrl', function(repoUrl, branch, path) {
                    return String(repoUrl).replace('github.com', 'raw.githubusercontent.com') +
                           '/refs/heads/' + branch + '/' + path;
                  });

                  const repoUrl = context.payload.repository.html_url;
                  const charts = Object.entries(index.entries)
                    .sort(([a], [b]) => a.localeCompare(b))
                    .map(([name, versions]) => {
                      if (!versions || !versions.length) return null;
                      return {
                        Name: name,
                        Version: versions[0].version || '',
                        Type: versions[0].type || 'application',
                        Description: versions[0].description || ''
                      };
                    })
                    .filter(Boolean);

                  const compiledTemplate = Handlebars.compile(template);
                  const newContent = compiledTemplate({
                    Charts: charts,
                    RepoURL: repoUrl,
                    Branch: defaultBranchName
                  });

                  const indexMdPath = indexPath.replace('.yaml', '.md');
                  const placeholderPath = '.placeholder';
                  try {
                    await fs.writeFile(indexMdPath, newContent);
                  } catch (writeError) {
                    core.setFailed('Failed to write ' + indexMdPath + ': ' + writeError.message);
                    return;
                  }

                  await runGit(['add', indexMdPath]);
                  const placeholderExists = await fileExists(placeholderPath);
                  if (placeholderExists) {
                    try {
                      await fs.unlink(placeholderPath);
                      await runGit(['add', placeholderPath]);
                    } catch (unlinkError) {
                      core.warning('Failed to remove placeholder file: ' + unlinkError.message);
                    }
                  }

                  const hasChanges = (await runGit(['diff', '--staged', '--name-only'])).trim().length > 0;
                  if (hasChanges) {
                    const { additions, deletions } = await getGitStagedChanges(runGit, fs);
                    const headSha = await runGit(['rev-parse', 'HEAD']);
                    try {
                      await createSignedCommit({
                        github,
                        context,
                        core,
                        branchName,
                        expectedHeadOid: headSha,
                        additions,
                        deletions,
                        commitMessage: 'chore(github-action): update chart documentation'
                      });

                      core.info('Successfully updated chart documentation');
                    } catch (commitError) {
                      core.warning('GitHub API commit failed: ' + commitError.message);
                      core.info('Attempting direct Git commit and push...');
                      try {
                        await runGit(['commit', '-m', 'chore(github-action): update chart documentation']);
                        await retryGitPush({ runGit, core, branch: branchName });
                        core.info('Successfully updated chart documentation using Git commands');
                      } catch (gitError) {
                        core.setFailed('Failed to commit changes: ' + gitError.message);
                      }
                    }
                  } else {
                    core.info('No changes to commit');
                  }
                }
              });
            } catch (error) {
              core.setFailed('Unexpected error: ' + error.message);
            }
