name: Charts Release

on:
  push:
    branches:
      - main
    paths:
      - .github/pages/config.yml
      - .github/pages/index.md.hbs
      - application/**
      - library/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    name: Package and Publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure repository
        uses: actions/github-script@v7
        with:
          script: |
            const configureGit = require('./.github/scripts/git-config.js');
            await configureGit({github, context, core, exec});

      - name: Setup helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install node.js dependencies
        run: npm install js-yaml handlebars

      - name: Get chart-releaser configuration
        id: chart-config
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs/promises');
            const pagesModule = require('./.github/scripts/pages.js');
            const { setOutputs, setupChartReleaserConfig } = pagesModule;
            setOutputs(core);
            await setupChartReleaserConfig({ core, fs });

      - name: Release application charts
        uses: helm/chart-releaser-action@v1
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_INDEX_PATH: ${{ steps.chart-config.outputs.CR_INDEX_PATH }}
          CR_SKIP_EXISTING: ${{ steps.chart-config.outputs.CR_SKIP_EXISTING }}
          CR_PAGES_BRANCH: ${{ steps.chart-config.outputs.CR_PAGES_BRANCH }}
          CR_CHARTS_REPO_URL: ${{ steps.chart-config.outputs.CR_CHARTS_REPO_URL }}
          CR_RELEASE_NAME_TEMPLATE: ${{ steps.chart-config.outputs.CR_RELEASE_NAME_TEMPLATE }}
          CR_RELEASE_TEMPLATE: ${{ steps.chart-config.outputs.CR_RELEASE_TEMPLATE }}
          CR_PACKAGES_WITH_INDEX: ${{ steps.chart-config.outputs.CR_PACKAGES_WITH_INDEX }}
        with:
          charts_dir: ${{ steps.chart-config.outputs.DIRECTORY_APPLICATION }}
          skip_existing: true

      - name: Release library charts
        uses: helm/chart-releaser-action@v1
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_INDEX_PATH: ${{ steps.chart-config.outputs.CR_INDEX_PATH }}
          CR_SKIP_EXISTING: ${{ steps.chart-config.outputs.CR_SKIP_EXISTING }}
          CR_PAGES_BRANCH: ${{ steps.chart-config.outputs.CR_PAGES_BRANCH }}
          CR_CHARTS_REPO_URL: ${{ steps.chart-config.outputs.CR_CHARTS_REPO_URL }}
          CR_RELEASE_NAME_TEMPLATE: ${{ steps.chart-config.outputs.CR_RELEASE_NAME_TEMPLATE }}
          CR_RELEASE_TEMPLATE: ${{ steps.chart-config.outputs.CR_RELEASE_TEMPLATE }}
          CR_PACKAGES_WITH_INDEX: ${{ steps.chart-config.outputs.CR_PACKAGES_WITH_INDEX }}
        with:
          charts_dir: ${{ steps.chart-config.outputs.DIRECTORY_LIBRARY }}
          skip_existing: true

      - name: Generate chart index page
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs/promises');
            const { generateChartIndex } = require('./.github/scripts/pages.js');
            await generateChartIndex({ context, core, fs });

      - name: Setup build environment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs/promises');
            const { setupBuildEnvironment } = require('./.github/scripts/pages.js');
            await setupBuildEnvironment({ core, fs });

      - name: Build website
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
