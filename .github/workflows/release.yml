name: Charts Release

on:
  push:
    branches:
      - main
    paths:
      - application/**
      - library/**
      - .github/chart-releaser.yml
      - .github/pages/index.md.hbs
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: Package and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        uses: actions/github-script@v7
        with:
          script: |
            const configureGit = require('./.github/scripts/git-config.js');
            await configureGit({github, context, core, exec});

      - name: Setup helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install js-yaml handlebars

      - name: Create dist directory
        run: install -d ./_dist

      - name: Release application charts
        uses: helm/chart-releaser-action@v1
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_INDEX_PATH: ./_dist/index.yaml
        with:
          charts_dir: application
          config: .github/chart-releaser.yml
          skip_existing: true

      - name: Release library charts
        uses: helm/chart-releaser-action@v1
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_INDEX_PATH: ./_dist/index.yaml
        with:
          charts_dir: library
          config: .github/chart-releaser.yml
          skip_existing: true

      - name: Generate chart index page
        id: generate_index
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs/promises');
            const yaml = require('js-yaml');
            const Handlebars = require('handlebars');
            const indexYamlPath = './_dist/index.yaml';
            const indexHtmlPath = './_dist/index.html'; // Changed from index.md
            const templatePath = '.github/pages/index.md.hbs';

            try {
              core.info(`Reading index YAML from ${indexYamlPath}`);
              const indexContent = await fs.readFile(indexYamlPath, 'utf8');
              const index = yaml.load(indexContent);

              if (!index || !index.entries) {
                core.warning('Invalid or empty index.yaml file, skipping index.md generation.');
                // Exit gracefully if index is invalid, prevents further errors
                process.exit(0);
              }

              core.info(`Reading template from ${templatePath}`);
              const template = await fs.readFile(templatePath, 'utf8');

              // Register helper for template
              Handlebars.registerHelper('rawGithubUrl', function(repoUrl, branch, path) {
                 return String(repoUrl).replace('github.com', 'raw.githubusercontent.com') + '/' + branch + '/' + path;
              });

              const repoUrl = context.payload.repository.html_url;
              const defaultBranchName = context.payload.repository.default_branch;

              const charts = Object.entries(index.entries)
                .sort(([a], [b]) => a.localeCompare(b))
                .map(([name, versions]) => {
                  if (!versions || !versions.length) return null;
                  const latest = versions[0]; // Assuming versions[0] is the latest
                  return {
                    Name: name,
                    Version: latest.version || '',
                    Type: latest.type || 'application', // Default type if missing
                    Description: latest.description || ''
                  };
                })
                .filter(Boolean);

              const compiledTemplate = Handlebars.compile(template);
              const newContent = compiledTemplate({
                Charts: charts,
                RepoURL: repoUrl,
                Branch: defaultBranchName
              });

              core.info(`Writing generated index.html to ${indexHtmlPath}`); // Changed from index.md
              await fs.writeFile(indexHtmlPath, newContent);
              core.info('Successfully generated index.html'); // Changed from index.md

            } catch (error) {
              // Check if error is due to missing index.yaml (ENOENT) and exit gracefully
              if (error.code === 'ENOENT' && error.path === indexYamlPath) {
                 core.warning(`Index file not found at ${indexYamlPath}, likely no charts released. Skipping index.html generation.`); // Changed from index.md
                 process.exit(0);
              } else {
                 core.setFailed(`Failed to generate index.html: ${error.message}`); // Changed from index.md
                 // Re-throw to ensure workflow fails
                 throw error;
              }
            }

      - name: Prepare jekyll config and index
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs/promises');
            const path = require('path');

            const configSource = '.github/pages/config.yml';
            const configDest = '_config.yml';
            const indexHtmlSource = './_dist/index.html'; // Changed from index.md
            const indexHtmlDest = './index.html'; // Changed from index.md
            const indexYamlSource = './_dist/index.yaml';
            const indexYamlDest = './index.yaml';

            async function fileExists(filePath) {
              try {
                await fs.access(filePath);
                return true;
              } catch {
                return false;
              }
            }

            try {
              core.info(`Copying ${configSource} to ${configDest}`);
              await fs.copyFile(configSource, configDest);

              if (await fileExists(indexHtmlSource)) { // Changed from indexMdSource
                core.info(`Copying ${indexHtmlSource} to ${indexHtmlDest}`); // Changed paths
                await fs.copyFile(indexHtmlSource, indexHtmlDest); // Changed paths
              } else {
                core.warning(`Generated ${indexHtmlSource} not found. Jekyll will use root README.md or default.`); // Changed path
              }

              if (await fileExists(indexYamlSource)) {
                core.info(`Copying ${indexYamlSource} to ${indexYamlDest}`);
                await fs.copyFile(indexYamlSource, indexYamlDest);
              } else {
                 core.info(`Generated ${indexYamlSource} not found, skipping copy.`);
              }
              core.info('Jekyll preparation complete.');

            } catch (error) {
              core.setFailed(`Failed to prepare Jekyll files: ${error.message}`);
              throw error; // Re-throw to fail the workflow step
            }

      - name: Pre-Build Diagnostics
        run: |
          echo "--- Root Directory Listing ---"
          ls -la
          echo "--- Content of ./index.html ---"
          cat ./index.html || echo "./index.html not found"
          echo "--- Content of ./README.md ---"
          cat ./README.md || echo "./README.md not found"
          echo "--- Content of application/ubuntu/README.md ---"
          cat application/ubuntu/README.md || echo "application/ubuntu/README.md not found"
          echo "-------------------------------"

      - name: Build website
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./

      - name: Post-Build Diagnostics
        run: |
          echo "--- _site Directory Listing ---"
          ls -la ./_site
          echo "--- Content of ./_site/index.html ---"
          cat ./_site/index.html || echo "./_site/index.html not found"
          echo "-----------------------------------"

          destination: ./_site

      - name: Deploy website
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: false
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_message: "chore(github-action): publish site and update chart index"
          force_orphan: false
