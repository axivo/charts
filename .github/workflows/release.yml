name: Charts Release

on:
  push:
    branches:
      - main
    paths:
      - .github/pages/config.yml
      - .github/pages/index.md.hbs
      - application/**
      - library/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    name: Package and Publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure repository
        uses: actions/github-script@v7
        with:
          script: |
            const configureGit = require('./.github/scripts/git-config.js');
            await configureGit({ github, context, core, exec });

      - name: Setup helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install node.js dependencies
        run: npm install js-yaml handlebars

      - name: Generate chart-releaser branch
        id: branch-manager
        uses: actions/github-script@v7
        with:
          script: |
            const { CONFIG, manageReleaseBranch } = require('./.github/scripts/pages.js');
            await manageReleaseBranch({ core, exec, action: 'create' });
            core.setOutput('branch', CONFIG.release.branch);

      - name: Run chart-releaser for application charts
        uses: helm/chart-releaser-action@v1
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          charts_dir: application
          pages_branch: ${{ steps.branch-manager.outputs.branch }}
          packages_with_index: false
          skip_existing: true

      - name: Run chart-releaser for library charts
        uses: helm/chart-releaser-action@v1
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          charts_dir: library
          pages_branch: ${{ steps.branch-manager.outputs.branch }}
          packages_with_index: false
          skip_existing: true

      - name: Generate chart index page
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs/promises');
            const { generateChartIndex } = require('./.github/scripts/pages.js');
            await generateChartIndex({ context, core, exec, fs });

      - name: Setup build environment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs/promises');
            const { setupBuildEnvironment } = require('./.github/scripts/pages.js');
            await setupBuildEnvironment({ core, fs });

      - name: Build website
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Setup pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
